<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi Siamo - Progetto Crittografia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-white font-['Plus_Jakarta_Sans']">
    
    <nav class="py-6 px-8 border-b border-slate-800 bg-slate-950">
        <div class="custom-container flex justify-between items-center">
            <div class="text-xs tracking-widest uppercase text-slate-500 font-semibold">Archivio Crittografico 2026</div>
            <a href="index.html" class="text-sm font-semibold text-sky-400 hover:text-white transition-all flex items-center gap-2">
                ← Torna alla Home
            </a>
        </div>
    </nav>

    <main class="py-16 px-8">
        <div class="max-w-4xl mx-auto">
            
            <div class="text-center mb-24">
                <h1 class="text-6xl font-bold mb-10 bg-gradient-to-r from-white to-slate-500 bg-clip-text text-transparent">
                    Chi siamo?
                </h1>
                <div class="inline-block p-6 bg-slate-900/50 border border-slate-800 rounded-3xl shadow-2xl">
                    <img src="images/thegerrys.jpeg" alt="Logo del Gruppo" class="h-48 w-auto rounded-xl">
                </div>
            </div>

            <div class="space-y-10">
                <h2 class="text-base uppercase tracking-[0.3em] text-sky-500 font-bold mb-8 border-b border-sky-500/20 pb-4">
                    I Membri del Team
                </h2>

                <div class="flex items-center gap-10 p-6 rounded-2xl hover:bg-slate-900/60 transition-all border border-transparent hover:border-slate-800 group">
                    <div class="w-32 h-32 flex-shrink-0">
                        <img src="images/Scode.jpeg" alt="Scode" class="w-full h-full object-cover rounded-2xl border-2 border-slate-700 group-hover:border-sky-500 transition-colors">
                    </div>
                    <div>
                        <h3 class="text-3xl font-bold text-white mb-2">Tommaso Scodellaro</h3>
                        <p class="text-slate-400 text-lg italic"> Capitano</p>
                    </div>
                </div>

                <div class="flex items-center gap-10 p-6 rounded-2xl hover:bg-slate-900/60 transition-all border border-transparent hover:border-slate-800 group">
                    <div class="w-32 h-32 flex-shrink-0">
                        <img src="images/Squello.jpeg" alt="Squello" class="w-full h-full object-cover rounded-2xl border-2 border-slate-700 group-hover:border-sky-500 transition-colors">
                    </div>
                    <div>
                        <h3 class="text-3xl font-bold text-white mb-2">Geronimo Squellati</h3>
                        <p class="text-slate-400 text-lg italic"> Navigatore</p>
                    </div>
                </div>

                <div class="flex items-center gap-10 p-6 rounded-2xl hover:bg-slate-900/60 transition-all border border-transparent hover:border-slate-800 group">
                    <div class="w-32 h-32 flex-shrink-0">
                        <img src="images/Tony.jpeg" alt="Tony" class="w-full h-full object-cover rounded-2xl border-2 border-slate-700 group-hover:border-sky-500 transition-colors">
                    </div>
                    <div>
                        <h3 class="text-3xl font-bold text-white mb-2">Brian Toniazzo</h3>
                        <p class="text-slate-400 text-lg italic"> Medico </p>
                    </div>
                </div>

                <div class="flex items-center gap-10 p-6 rounded-2xl hover:bg-slate-900/60 transition-all border border-transparent hover:border-slate-800 group">
                    <div class="w-32 h-32 flex-shrink-0">
                        <img src="images/Calde.jpeg" alt="Membro 4" class="w-full h-full object-cover rounded-2xl border-2 border-slate-700 group-hover:border-sky-500 transition-colors">
                    </div>
                    <div>
                        <h3 class="text-3xl font-bold text-white mb-2">Michael Segovia Calderon</h3>
                        <p class="text-slate-400 text-lg italic"> Cecchino</p>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer class="py-12 border-t border-slate-800 text-center text-slate-500 text-xs uppercase tracking-widest">
        © 2026 Progetto Crittografia - Uso Didattico
    </footer>

</body>
</html>
